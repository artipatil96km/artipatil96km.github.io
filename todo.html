<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>To-Do List - Local Storage</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #667eea; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
.container { background: white; border-radius: 10px; padding: 30px; max-width: 500px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
h1 { color: #333; margin-bottom: 20px; text-align: center; }
.input-group { display: flex; gap: 10px; margin-bottom: 20px; }
input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
button:hover { background: #764ba2; }
.stats { display: flex; justify-content: space-around; margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; }
.stat { text-align: center; }
.stat-num { font-size: 24px; font-weight: bold; color: #667eea; }
.tasks { max-height: 400px; overflow-y: auto; }
.task { display: flex; align-items: center; padding: 12px; background: #f9f9f9; margin-bottom: 8px; border-radius: 5px; }
.task input { width: 20px; height: 20px; margin-right: 10px; }
.task-text { flex: 1; }
.task.done .task-text { text-decoration: line-through; color: #999; }
.delete-btn { background: #ff6b6b; padding: 5px 10px; font-size: 0.8rem; }
.empty { text-align: center; color: #999; padding: 40px; }
</style>
</head>
<body>
<div class="container">
<h1>📝 To-Do List</h1>
<div class="input-group">
<input type="text" id="taskInput" placeholder="Add a task..." />
<button onclick="addTask()">Add</button>
</div>
<div class="stats">
<div class="stat"><div class="stat-num" id="total">0</div>Total</div>
<div class="stat"><div class="stat-num" id="done">0</div>Done</div>
<div class="stat"><div class="stat-num" id="pending">0</div>Pending</div>
</div>
<div class="tasks" id="taskList"></div>
<button onclick="clearAll()" style="width: 100%; margin-top: 10px;">Clear All</button>
</div>

<script>
let tasks = [];

window.onload = function() {
  loadTasks();
  render();
  document.getElementById('taskInput').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') addTask();
  });
};

function addTask() {
  const input = document.getElementById('taskInput');
  if(!input.value.trim()) return;
  tasks.push({id: Date.now(), text: input.value, done: false});
  input.value = '';
  saveTasks();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
}

function toggleTask(id) {
  tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  saveTasks();
  render();
}

function clearAll() {
  if(confirm('Clear all tasks?')) {
    tasks = [];
    saveTasks();
    render();
  }
}

function render() {
  const list = document.getElementById('taskList');
  if(tasks.length === 0) {
    list.innerHTML = '<div class="empty">No tasks yet!</div>';
  } else {
    list.innerHTML = tasks.map(t => `
      <div class="task ${t.done ? 'done' : ''}">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})" />
        <span class="task-text">${t.text}</span>
        <button class="delete-btn" onclick="deleteTask(${t.id})">Delete</button>
      </div>
    `).join('');
  }
  
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  document.getElementById('total').textContent = total;
  document.getElementById('done').textContent = done;
  document.getElementById('pending').textContent = total - done;
}

function saveTasks() {
  localStorage.setItem('myTasks', JSON.stringify(tasks));
}

function loadTasks() {
  const saved = localStorage.getItem('myTasks');
  tasks = saved ? JSON.parse(saved) : [];
}
</script>
</body>
</html>
